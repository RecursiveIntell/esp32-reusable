  <rect x="330" y="120" width="185" height="116" fill="#0f172a"/><rect class="box" x="330" y="120" width="185" height="116" fill="rgba(6,78,59,.55)" stroke="#34d399"/><text x="352" y="152" class="label">ri-esp-policy</text><text x="352" y="180" class="small">sensor → PromptId</text><text x="352" y="202" class="small">stale/missing/hot</text><text x="352" y="224" class="small">safe cold/dry fallback</text>
  <rect x="650" y="120" width="185" height="116" fill="#0f172a"/><rect class="box" x="650" y="120" width="185" height="116" fill="rgba(76,29,149,.50)" stroke="#a78bfa"/><text x="672" y="152" class="label">local-language</text><text x="672" y="180" class="small">S3 p15 prompt table</text><text x="672" y="202" class="small">S3 receipt schema</text><text x="672" y="224" class="small">OLED-ready text</text>
  <rect x="970" y="120" width="185" height="116" fill="#0f172a"/><rect class="box" x="970" y="120" width="185" height="116" fill="rgba(120,53,15,.45)" stroke="#fbbf24"/><text x="992" y="152" class="label">ri-esp-proof</text><text x="992" y="180" class="small">route receipt</text><text x="992" y="202" class="small">local prompt fields</text><text x="992" y="224" class="small">FeatureTransfer</text>
