    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/></marker>
    <style>
      .title{font:700 28px ui-monospace, SFMono-Regular, Menlo, monospace;fill:#e2e8f0}.sub{font:13px ui-monospace,monospace;fill:#94a3b8}.box{rx:12;stroke-width:2}.label{font:700 15px ui-monospace,monospace;fill:#f8fafc}.small{font:11px ui-monospace,monospace;fill:#cbd5e1}.edge{stroke:#38bdf8;stroke-width:2;fill:none;marker-end:url(#arrow)}.dash{stroke-dasharray:7 5}.claim{font:12px ui-monospace,monospace;fill:#fde68a}
    </style>
